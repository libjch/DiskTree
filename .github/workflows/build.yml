name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build and validate
        run: ./check.sh
